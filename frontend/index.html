<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龙猫校园刷跑</title>
<script src="https://unpkg.com/vue@3.4.38/dist/vue.global.prod.js"></script>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--t2:#6e6e73;--bd:#d2d2d7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);background:var(--bg)}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh}
.app{max-width:640px;margin:0 auto;padding-bottom:40px}
.app-header{text-align:center;padding:24px 16px 8px}
.app-header h1{font-size:1.5rem;font-weight:800}
.app-header span{display:block;margin-top:4px;font-size:.85rem;color:var(--t2)}
.card{background:var(--card);border-radius:12px;padding:24px;margin:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card h2,.card h3{margin:0 0 12px}
.qr-box{display:flex;flex-direction:column;align-items:center}
.qr-box img{width:260px;height:260px;border-radius:8px;border:1px solid var(--bd)}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:1rem;cursor:pointer;text-align:center;transition:.2s}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-primary{background:#3b82f6;color:#fff;margin-top:12px}
.btn-primary:hover:not(:disabled){background:#2563eb}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--bd);margin-top:12px}
.btn-danger{background:transparent;color:#dc2626;border:1px solid #dc2626}
.msg{padding:12px 16px;border-radius:8px;margin:8px 16px;font-size:.9rem}
.msg-info{background:#dbeafe;color:#2563eb}
.msg-ok{background:#dcfce7;color:#16a34a}
.msg-err{background:#fee2e2;color:#dc2626}
.msg-load{background:#fef3c7;color:#d97706}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--bd);border-top-color:#3b82f6;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.user-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-radius:12px;margin:12px 16px}
.user-info{display:flex;gap:12px;align-items:baseline}
.user-info .name{font-weight:700;font-size:1.1rem}
.user-info .num{color:var(--t2)}
.user-info .school{color:var(--t2);font-size:.8rem}
.tabs{display:flex;gap:8px;margin:0 16px 8px}
.tab{flex:1;padding:10px;border:1px solid var(--bd);border-radius:8px;background:var(--card);cursor:pointer;font-size:.9rem;text-align:center}
.tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.form-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.form-row label{min-width:70px;font-size:.9rem;color:var(--t2)}
.input{flex:1;padding:8px 12px;border:1px solid var(--bd);border-radius:6px;font-size:.95rem;background:var(--bg);color:var(--text)}
select.input{cursor:pointer}
.tips{font-size:.8rem;color:var(--t2);padding:12px;background:var(--bg);border-radius:8px;margin-top:16px}
.tips ul{margin:6px 0 0 18px}
.tips li{margin:3px 0}
/* calendar */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-legend{display:flex;gap:16px;margin-bottom:12px;font-size:.8rem}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.dot-g{background:#22c55e}.dot-r{background:#ef4444}.dot-b{background:#3b82f6}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:.8rem;cursor:pointer}
.cc:hover{background:var(--bg)}
.cc.h{color:var(--t2);font-weight:600;cursor:default}
.cc.run{background:#dcfce7}.cc.miss{background:#fee2e2}.cc.today{border:2px solid #3b82f6}
.cc .dot2{width:4px;height:4px;border-radius:50%;margin-top:2px}
.dot2.g{background:#22c55e}.dot2.r{background:#ef4444}
.tt{width:100%;border-collapse:collapse;font-size:.85rem}
.tt th,.tt td{padding:8px;border-bottom:1px solid var(--bd);text-align:left}
.tt th{color:var(--t2)}
.empty{color:var(--t2);text-align:center;padding:24px}
.green{color:#16a34a;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div class="app">
    <div class="app-header"><h1>🐱 龙猫校园刷跑</h1><span>微信扫码登录 · 自动轨迹生成 · 跑步记录提交</span></div>

    <!-- Login -->
    <div v-if="!user" class="card">
      <h2>微信扫码登录</h2>
      <p style="color:var(--t2);margin-bottom:16px">请用微信扫描下方二维码，授权"龙猫校园"</p>
      <div class="qr-box">
        <div v-if="qrLoading" style="padding:80px 0;color:var(--t2)"><span class="spinner"></span> 加载二维码...</div>
        <img v-else-if="qrUrl" :src="qrUrl" alt="QR">
      </div>
      <div v-if="statusMsg" :class="['msg', statusType]">{{ statusMsg }}</div>
      <button class="btn btn-secondary" @click="fetchQr" :disabled="qrLoading">{{ qrLoading?'加载中...':'刷新二维码' }}</button>
      <div style="margin-top:20px;font-size:.8rem;color:var(--t2)">
        <p><strong>使用步骤：</strong></p>
        <ol style="margin:6px 0 0 18px">
          <li>微信扫描上方二维码</li>
          <li>授权"龙猫校园"登录</li>
          <li>自动跳转到跑步面板</li>
        </ol>
        <p style="margin-top:8px;color:#f59e0b">⚠️ 请用浏览器打开，勿在微信内打开</p>
      </div>
    </div>

    <!-- Main Panel -->
    <template v-if="user">
      <div class="user-bar">
        <div class="user-info">
          <span class="name">{{ user.stuName }}</span>
          <span class="num">{{ user.stuNumber }}</span>
          <span class="school">{{ user.schoolName }}</span>
        </div>
        <button class="btn btn-danger" style="width:auto;padding:6px 16px" @click="doLogout">退出</button>
      </div>

      <div class="tabs">
        <div :class="['tab',{active:tab==='run'}]" @click="switchTab('run')">🏃 跑步</div>
        <div :class="['tab',{active:tab==='cal'}]" @click="switchTab('cal')">📅 日历</div>
        <div :class="['tab',{active:tab==='hist'}]" @click="switchTab('hist')">📋 历史</div>
      </div>

      <div v-if="msg" :class="['msg', msgType]">{{ msg }}</div>

      <!-- Run Panel -->
      <div v-if="tab==='run'" class="card">
        <h3>跑步设置</h3>
        <div class="form-row"><label>日期</label><input type="date" v-model="runDate" class="input"></div>
        <div class="form-row"><label>路线</label>
          <select v-model="routeId" class="input">
            <option v-for="r in routes" :key="r.pointId" :value="r.pointId">{{ r.pointName }}</option>
          </select>
        </div>
        <div v-if="selectedRoute" style="font-size:.8rem;color:var(--t2);margin-bottom:12px">距离要求: {{ distance }} km</div>
        <div class="form-row"><label>开始时间</label><input type="time" v-model="startTime" class="input"></div>
        <div class="form-row"><label>时长: <b>{{ durationMin }}分钟</b></label><input type="range" v-model.number="durationMin" min="10" max="25" style="flex:1"></div>
        <div class="form-row"><label>预计结束</label><span style="color:var(--t2);font-size:.85rem">{{ endTimePreview }} (含随机波动)</span></div>
        <button class="btn btn-primary" @click="doRun" :disabled="submitting">
          {{ submitting?'提交中...':'🚀 提交跑步 — '+runDate }}
        </button>
        <div class="tips"><strong>提示：</strong><ul><li>可提交<strong>任意日期</strong>（过去/未来均可）</li><li>时长含随机波动模拟真实跑步</li><li>提交后立即生效</li></ul></div>
      </div>

      <!-- Calendar -->
      <div v-if="tab==='cal'" class="card">
        <div class="cal-header">
          <button class="btn btn-secondary" style="width:auto;padding:4px 12px" @click="prevMonth">◀</button>
          <h3 style="margin:0">{{ calYear }}年{{ calMonth+1 }}月</h3>
          <button class="btn btn-secondary" style="width:auto;padding:4px 12px" @click="nextMonth">▶</button>
        </div>
        <div class="cal-legend"><span><span class="dot dot-g"></span>已跑</span><span><span class="dot dot-r"></span>未跑</span><span><span class="dot dot-b"></span>今天</span></div>
        <div class="cgrid">
          <div class="cc h" v-for="w in weekdays">{{ w }}</div>
          <div v-for="(d,i) in calDays" :key="i"
               :class="['cc',{'h':!d},{run:d&&d.record},{miss:d&&!d.record&&d.past},{today:d&&d.isToday}]"
               @click="d&&clickDay(d)">
            <template v-if="d">{{ d.day }}<span v-if="d.record" class="dot2 g"></span><span v-else-if="d.past" class="dot2 r"></span></template>
          </div>
        </div>
        <p style="font-size:.75rem;color:var(--t2);margin-top:8px">点击日期可直接选择该天进行跑步</p>
      </div>

      <!-- History -->
      <div v-if="tab==='hist'" class="card">
        <h3>提交历史</h3>
        <div v-if="tasks.length===0" class="empty">暂无记录</div>
        <table v-else class="tt"><thead><tr><th>日期</th><th>距离</th><th>用时</th><th>配速</th><th>状态</th></tr></thead>
          <tbody><tr v-for="t in tasks" :key="t.id"><td>{{t.run_date}}</td><td>{{t.distance}}km</td><td>{{t.used_time}}</td><td>{{t.avg_speed}}km/h</td><td class="green">{{t.status==='success'?'✅成功':t.status}}</td></tr></tbody>
        </table>
      </div>
    </template>
  </div>
</div>

<script>
const {createApp,ref,computed,onMounted,onUnmounted} = Vue

createApp({
  setup(){
    const API = (p,o={})=>fetch(p,o).then(r=>r.json())

    const user = ref(null)
    const tab = ref('run')
    // Login
    const qrUrl = ref(''), qrUuid = ref(''), qrLoading = ref(false)
    const statusMsg = ref(''), statusType = ref('msg-info')
    let sse = null
    // Run
    const routes = ref([]), routeId = ref(''), runDate = ref('')
    const startTime = ref('06:00'), durationMin = ref(15), distance = ref(3.2)
    const submitting = ref(false), msg = ref(''), msgType = ref('msg-info')
    // Calendar
    const records = ref({}), calYear = ref(2026), calMonth = ref(0)
    const tasks = ref([])

    const weekdays = ['日','一','二','三','四','五','六']

    const selectedRoute = computed(()=>routes.value.find(r=>r.pointId===routeId.value))
    const endTimePreview = computed(()=>{
      const [h,m]=startTime.value.split(':').map(Number)
      const t=h*60+m+durationMin.value
      return String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0')
    })
    const calDays = computed(()=>{
      const fd=new Date(calYear.value,calMonth.value,1)
      const ld=new Date(calYear.value,calMonth.value+1,0)
      const today=new Date().toISOString().slice(0,10)
      const days=[]
      for(let i=0;i<fd.getDay();i++) days.push(null)
      for(let d=1;d<=ld.getDate();d++){
        const ds=`${calYear.value}-${String(calMonth.value+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
        days.push({day:d,date:ds,isToday:ds===today,record:records.value[ds]||null,past:ds<today})
      }
      return days
    })

    function show(m,t='msg-info'){msg.value=m;msgType.value=t;setTimeout(()=>msg.value='',5000)}

    // Login flow
    async function fetchQr(){
      qrLoading.value=true;statusMsg.value='';qrUrl.value=''
      if(sse){sse.close();sse=null}
      try{
        const r=await API('/api/auth/qr');qrUrl.value=r.imgUrl;qrUuid.value=r.uuid
        statusMsg.value='请用微信扫描二维码';statusType.value='msg-info'
        startSse(r.uuid)
      }catch(e){statusMsg.value='获取二维码失败: '+e.message;statusType.value='msg-err'}
      finally{qrLoading.value=false}
    }
    function startSse(uuid){
      if(sse)sse.close()
      sse=new EventSource('/api/auth/scan/'+uuid+'/sse')
      sse.addEventListener('scanned',e=>{
        const d=JSON.parse(e.data);sse.close()
        statusMsg.value='扫码成功，登录中...';statusType.value='msg-load'
        doLogin(d.code)
      })
      sse.addEventListener('timeout',()=>{statusMsg.value='扫码超时，请刷新';statusType.value='msg-err';sse.close()})
    }
    async function doLogin(code){
      try{
        const r=await API('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})})
        if(r.success){user.value=r.session;statusMsg.value='';initMain()}
        else{statusMsg.value='登录失败: '+r.message;statusType.value='msg-err'}
      }catch(e){statusMsg.value='登录异常: '+e.message;statusType.value='msg-err'}
    }
    async function doLogout(){
      try{await fetch('/api/session',{method:'DELETE'})}catch(e){}
      user.value=null
    }

    // Main panel
    async function initMain(){
      const today=new Date().toISOString().slice(0,10)
      runDate.value=today;calYear.value=new Date().getFullYear();calMonth.value=new Date().getMonth()
      try{
        const r=await API('/api/run/paper')
        if(r.success&&r.data){routes.value=r.data.runPointList||[];if(routes.value.length)routeId.value=routes.value[0].pointId;if(r.data.mileage)distance.value=parseFloat(r.data.mileage)}
      }catch(e){}
      await loadCal()
    }
    async function doRun(){
      if(!routeId.value)return show('请选择路线','msg-err')
      submitting.value=true;show('正在生成GPS轨迹...','msg-load')
      try{
        const g=await API('/api/run/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({routeId:routeId.value,distance:distance.value,runDate:runDate.value,startTime:startTime.value,durationMin:durationMin.value})})
        if(!g.success){show('生成失败: '+g.message,'msg-err');submitting.value=false;return}
        show(`轨迹生成成功! ${g.data.pointCount}点, 预计${g.data.distance}km, 提交中...`,'msg-load')
        const s=await API('/api/run/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({routeId:routeId.value,runDate:runDate.value})})
        if(s.success){show(`✅ 跑步成功! 距离${s.data.distance}km 用时${s.data.usedTime} 配速${s.data.avgSpeed}km/h`,'msg-ok');await loadCal()}
        else show('提交失败: '+s.message,'msg-err')
      }catch(e){show('异常: '+e.message,'msg-err')}
      finally{submitting.value=false}
    }
    async function loadCal(){
      try{const r=await API('/api/history/calendar');if(r.success)records.value=r.data.records||{};}catch(e){}
    }
    async function loadTasks(){
      try{const r=await API('/api/history/tasks');if(r.success)tasks.value=r.data||[];}catch(e){}
    }
    function switchTab(t){tab.value=t;if(t==='hist')loadTasks();if(t==='cal')loadCal()}
    function clickDay(d){if(d){runDate.value=d.date;tab.value='run'}}
    function prevMonth(){if(calMonth.value===0){calYear.value--;calMonth.value=11}else calMonth.value--}
    function nextMonth(){if(calMonth.value===11){calYear.value++;calMonth.value=0}else calMonth.value++}

    // Init
    onMounted(async()=>{
      try{const r=await API('/api/session/check');if(r.success&&r.data){user.value=r.data;initMain()}}catch(e){}
      if(!user.value) fetchQr()
    })
    onUnmounted(()=>{if(sse)sse.close()})

    return{user,tab,qrUrl,qrUuid,qrLoading,statusMsg,statusType,
      routes,routeId,runDate,startTime,durationMin,distance,submitting,msg,msgType,
      records,calYear,calMonth,tasks,weekdays,
      selectedRoute,endTimePreview,calDays,
      fetchQr,doLogout,doRun,switchTab,clickDay,prevMonth,nextMonth}
  }
}).mount('#app')
</script>
</body>
</html>
